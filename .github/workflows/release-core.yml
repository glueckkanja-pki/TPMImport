# This creates a new release on GitHub

name: Release Current .NET Core Version

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact from build workflow
        # actions/download-artifact (the official action) only works within the same workflow run.
        # Since we need artifacts from a different workflow (build-core.yml) on a specific branch,
        # we use the gh CLI instead. It is pre-installed on GitHub-hosted runners and maintained
        # by GitHub, so it needs no third-party action dependency.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow build-core.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "ERROR: No successful build-core.yml run found on main"
            gh run list --repo "$GITHUB_REPOSITORY" --workflow build-core.yml --branch main --limit 5
            exit 1
          fi
          echo "Downloading artifacts from run $run_id"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --dir publish

      - name: Create tag
        id: create_tag
        run: |
          tag=$(date +"%Y%m%d-%H%M-core")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          release_name: ${{ steps.create_tag.outputs.tag }}
          draft: true
          prerelease: false

          # Some debug output
      - name: "[Debug] Where Are We"
        run: pwd
      - name: "[Debug] List Files"
        run: ls -Rs
          
      - name: Upload Artifacts to Release
        uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: publish/tpmimport-win-x64/TPMImport.exe
          asset_name: TPMImport.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release edit "${{ steps.create_tag.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --draft=false
